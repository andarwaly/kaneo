databases:
  - name: kaneo-db
    plan: free
    databaseName: kaneo
    user: kaneo

services:
  - type: web
    name: kaneo
    runtime: docker
    dockerfilePath: ./Dockerfile.kaneo
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kaneo-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: KANEO_CLIENT_URL
        sync: false
        # Render only assigns the service's public https://<name>.onrender.com
        # URL after first deploy. Set this manually in the dashboard once you
        # know it, then redeploy — the entrypoint derives KANEO_API_URL as
        # {KANEO_CLIENT_URL}/api automatically.
